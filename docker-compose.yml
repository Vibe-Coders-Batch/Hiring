services:
  postgres:
    image: postgres:16-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vaivammhire
    volumes:
      - vaivammhire_pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d vaivammhire']
      interval: 5s
      timeout: 5s
      retries: 10

  ml-api:
    build:
      context: ./vaivammhire-ml
      dockerfile: Dockerfile
    ports:
      - '8080:8080'
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://127.0.0.1:8080/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 8

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/vaivammhire
      ML_API_BASE_URL: http://ml-api:8080
      ML_API_FEATURE_FLAGS: m1=on,m2=off,m3=on,m4=on,m5=on
      AWS_REGION: ap-south-1
      S3_RESUMES_BUCKET: local-docker
      S3_OFFERS_BUCKET: local-docker
      S3_TRAINING_BUCKET: local-docker
      SES_FROM_ADDRESS: docker@example.com
      SES_REPLY_TO: docker@example.com
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_BRAND_NAME: VaivammHire
      AUTH_DEV_SECRET: VaivammAdminDev2026!
    depends_on:
      postgres:
        condition: service_healthy
      ml-api:
        condition: service_healthy

volumes:
  vaivammhire_pg:
