# Neon migrations + AWS CDK deploy.
#
# CDK job runs when EITHER:
#   • Repository variable AWS_CDK_ENABLED = true  (Settings → Secrets and variables → Actions → Variables)
#   • Manual run with "Force CDK deploy" checked (workflow_dispatch)
#
# GitHub blocks passing secrets through job outputs — do not rely on a secret named AWS_CDK_ENABLED for gating.
#
# AWS auth: OIDC secret AWS_DEPLOY_ROLE_ARN, OR secrets AWS_ACCESS_KEY_ID + AWS_SECRET_ACCESS_KEY.

name: Deploy pipeline (Neon migrate + AWS CDK)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_aws_deploy:
        description: 'Run only database migrations (skip CDK)'
        required: false
        default: false
        type: boolean
      force_deploy_cdk:
        description: 'Run CDK even if repo variable AWS_CDK_ENABLED is not true'
        required: false
        default: false
        type: boolean

concurrency:
  group: deploy-aws-pipeline-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  neon-migrate:
    name: Neon · Drizzle migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install workspace
        run: pnpm install --no-frozen-lockfile

      - name: Run migrations (DATABASE_URL from secrets)
        working-directory: vaivammhire-app
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "${DATABASE_URL:-}" ]; then
            echo "::notice title=Neon migrations skipped::Add repository secret DATABASE_URL to run Drizzle migrations on push."
            exit 0
          fi
          pnpm exec drizzle-kit migrate

  deploy-cdk:
    name: AWS · CDK deploy all stacks
    needs: neon-migrate
    if: >-
      ${{
        needs.neon-migrate.result == 'success' &&
        (
          vars.AWS_CDK_ENABLED == 'true' ||
          (github.event_name == 'workflow_dispatch' && inputs.force_deploy_cdk == true)
        ) &&
        (github.event_name != 'workflow_dispatch' || inputs.skip_aws_deploy != true)
      }}
    runs-on: ubuntu-latest
    environment: production
    env:
      AWS_REGION: ap-south-1
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Decide AWS auth mode
        id: aws-mode
        env:
          ROLE_ARN: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          AK: ${{ secrets.AWS_ACCESS_KEY_ID }}
        run: |
          if [ -n "${ROLE_ARN:-}" ]; then
            echo "mode=oidc" >> "$GITHUB_OUTPUT"
          elif [ -n "${AK:-}" ]; then
            echo "mode=keys" >> "$GITHUB_OUTPUT"
          else
            echo "mode=none" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure AWS (OIDC)
        if: steps.aws-mode.outputs.mode == 'oidc'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure AWS (access keys)
        if: steps.aws-mode.outputs.mode == 'keys'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Missing AWS credentials
        if: steps.aws-mode.outputs.mode == 'none'
        run: |
          echo "::error::Set AWS_DEPLOY_ROLE_ARN (OIDC) or AWS_ACCESS_KEY_ID + AWS_SECRET_ACCESS_KEY"
          exit 1

      - name: Install workspace
        run: pnpm install --no-frozen-lockfile

      - name: Unit tests (app)
        run: pnpm --filter vaivammhire-app test

      - name: CDK deploy all
        env:
          CDK_CONTEXT_ENV: ${{ vars.CDK_ENV }}
        run: |
          CTX="${CDK_CONTEXT_ENV:-prod}"
          echo "Deploying CDK context env=$CTX"
          pnpm --filter vaivammhire-infra deploy -- --context env="$CTX"

      - name: Invalidate CloudFront (optional)
        if: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID != '' }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
