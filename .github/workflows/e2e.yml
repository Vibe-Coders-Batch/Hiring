name: E2E

on:
  pull_request:
  push:
    branches: [main]

jobs:
  playwright:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vaivammhire-app
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vaivammhire_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/vaivammhire_test
      AWS_REGION: ap-south-1
      S3_RESUMES_BUCKET: test-resumes
      S3_OFFERS_BUCKET: test-offers
      S3_TRAINING_BUCKET: test-training
      SES_FROM_ADDRESS: hiring@example.com
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      BEDROCK_MODEL_ID: anthropic.claude-sonnet-4-v1:0
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile
        working-directory: .
      - run: pnpm exec playwright install --with-deps chromium webkit
      - run: pnpm db:push
        continue-on-error: true
      - run: pnpm build
      - name: Run app
        run: pnpm start &
      - run: sleep 5 && pnpm test:e2e
