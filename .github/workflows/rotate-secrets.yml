name: Rotate third-party tokens

on:
  schedule:
    - cron: '0 4 1 */3 *' # 04:00 UTC on the 1st of every 3rd month (PRD §12.3, §17.2)
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  rotate:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ap-south-1
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Trigger rotation Lambdas
        run: |
          for secret in vaivammhire/google-oauth vaivammhire/linkedin-oauth vaivammhire/whatsapp vaivammhire/documenso; do
            echo "Rotating $secret"
            aws secretsmanager rotate-secret --secret-id "$secret" --rotate-immediately || true
          done
