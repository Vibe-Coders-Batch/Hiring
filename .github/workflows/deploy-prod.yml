# AWS CDK production deploy — optional. The Vaivamm Hire Next.js app is hosted on Vercel + Neon per the product plan.
# Run manually only when updating AWS Lambda/S3/SES/CDK stacks.
name: Deploy Production (AWS CDK)

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      AWS_REGION: ap-south-1
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - run: pnpm install --no-frozen-lockfile
      - run: pnpm --filter vaivammhire-app test
      - run: cd vaivammhire-infra && pnpm exec cdk deploy --all --require-approval never -c env=prod
      - name: Invalidate CloudFront
        if: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID != '' }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
