name: ML — Eval vs Incumbent

on:
  workflow_run:
    workflows: ['ML — Nightly Train']
    types: [completed]
  workflow_dispatch:
    inputs:
      model:
        required: true
      version:
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  eval:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ap-south-1
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: actions/setup-python@v5
        with:
          python-version-file: vaivammhire-ml/.python-version
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --extra training
        working-directory: vaivammhire-ml
      - run: uv run python eval/run_eval.py --model "${{ inputs.model || 'M1' }}" --version "${{ inputs.version || 'latest' }}" --out eval_metrics.json
        working-directory: vaivammhire-ml
      - uses: actions/upload-artifact@v4
        with:
          name: eval-metrics
          path: vaivammhire-ml/eval_metrics.json
