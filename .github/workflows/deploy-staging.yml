name: Deploy Staging

# Manual-only until GitHub OIDC + AWS role are wired up. To re-enable auto-deploy
# on every push to main:
#   1. Set up GitHub OIDC in your AWS account.
#   2. Create a deploy role and add its ARN as repo secret AWS_DEPLOY_ROLE_ARN.
#   3. Uncomment the `push:` trigger below.
on:
  workflow_dispatch:
  # push:
  #   branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    env:
      AWS_REGION: ap-south-1
      CDK_ENV: staging
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm --filter vaivammhire-infra deploy -- --context env=staging
