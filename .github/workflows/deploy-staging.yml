name: Deploy Staging

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    env:
      AWS_REGION: ap-south-1
      CDK_ENV: staging
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - uses: aws-actions/configure-aws-credentials@v4
        if: ${{ secrets.AWS_DEPLOY_ROLE_ARN != '' }}
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - if: ${{ secrets.AWS_DEPLOY_ROLE_ARN == '' }}
        run: |
          echo "::warning::AWS_DEPLOY_ROLE_ARN not configured — skipping deploy."
          echo "Set up GitHub OIDC and add the role ARN as a repo secret to enable auto-deploy."
          exit 0
      - if: ${{ secrets.AWS_DEPLOY_ROLE_ARN != '' }}
        run: pnpm install --no-frozen-lockfile
      - if: ${{ secrets.AWS_DEPLOY_ROLE_ARN != '' }}
        run: pnpm --filter vaivammhire-infra deploy -- --context env=staging
