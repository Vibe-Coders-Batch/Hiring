name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  app:
    name: app · lint + typecheck + unit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vaivammhire-app
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --no-frozen-lockfile
        working-directory: .
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test

  infra:
    name: infra · cdk synth
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vaivammhire-infra
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --no-frozen-lockfile
        working-directory: .
      - run: pnpm synth

  ml:
    name: ml · ruff + pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vaivammhire-ml
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      - uses: astral-sh/setup-uv@v3
      # Core deps only — training-only deps (torch, transformers, sagemaker, etc.)
      # are gated behind the 'training' extra and only installed by the nightly
      # ml-train workflow that runs on a beefier runner.
      - run: uv sync
      - run: uv run ruff check .
      - run: uv run pytest --maxfail=1
